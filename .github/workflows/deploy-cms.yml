name: Deploy CMS

on:
  push:
    branches: [main]
    paths:
      - "cms/**"

env:
  REGION: australia-southeast1
  IMAGE: australia-southeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cms/cms

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build and push image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} ./cms
          docker push ${{ env.IMAGE }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: cms
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}
          secrets: |
            SECRET_KEY=django-secret-key:latest
            DATABASE_URL=database-url:latest
            REVALIDATE_SECRET=revalidate-secret:latest
          env_vars: ^;^ALLOWED_HOSTS=cms-y6t3tnh4zq-ts.a.run.app cms.mehrd.exceed.com.sb cms-1011026295629.australia-southeast1.run.app;WAGTAIL_SITE_HOSTNAME=cms-y6t3tnh4zq-ts.a.run.app;WAGTAIL_SITE_PORT=443;FRONTEND_URL=${{ secrets.FRONTEND_URL }}
          flags: --port 8000 --min-instances 0 --max-instances 2 --allow-unauthenticated
